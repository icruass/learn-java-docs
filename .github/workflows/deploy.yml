name: 部署到 GitHub Pages

on:
  push:
    branches: ["main"] # 当 main 分支有推送时触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 安装依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm run build # 这条命令会生成 dist 文件夹

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # 告诉 GitHub 去 dist 文件夹里找网页文件

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
