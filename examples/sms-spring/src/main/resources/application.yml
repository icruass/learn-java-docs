# ===================================================================
# 默认配置：使用 H2 内存数据库，零外部依赖，运行 main 即可启动并连库。
# 切换到 MySQL：启动参数加 --spring.profiles.active=mysql（见 application-mysql.yml）。
# ===================================================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sms?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
server:
  port: 8080
